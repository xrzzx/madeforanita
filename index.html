
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for May Dewi Selfiany 💖</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        .container { text-align: center; color: white; padding: 20px; z-index: 10; }
        #text { font-size: 1.8rem; font-weight: bold; color: #ff69b4; text-shadow: 0 0 10px rgba(255,105,180,0.5); min-height: 3rem; }
        .btn { padding: 15px 30px; font-size: 1rem; background: #ff69b4; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(255,105,180,0.4); }
        #gift-img { max-width: 80%; border-radius: 15px; display: none; margin-top: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .heart { position: absolute; color: #ff69b4; animation: float 3s linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn" id="startBtn">KLIK UNTUK KEJUTAN ❤️</button>
        <div id="text"></div>
        <img id="gift-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpZzR6bm9oZzR6bm9oZzR6bm9oZzR6bm9oZzR6bm9oZzR6bm9oZzR6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/KztT2c4u8mYYUiMKdJ/giphy.gif">
    </div>

    <audio id="music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <script>
        const texts = [
            "Halo, May Dewi Selfiany...",
            "Ada sesuatu yang ingin aku sampaikan...",
            "Terima kasih sudah hadir di hidupku ❤️",
            "Kamu adalah bagian terindah dalam hariku.",
            "Aku ingin terus bersamamu selamanya.",
            "I LOVE YOU SO MUCH! 💖"
        ];
        
        let i = 0;
        const btn = document.getElementById('startBtn');
        const textDiv = document.getElementById('text');
        const img = document.getElementById('gift-img');
        const music = document.getElementById('music');

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            music.play();
            createHearts();
            showNextText();
        });

        function showNextText() {
            if (i < texts.length) {
                textDiv.innerHTML = texts[i];
                i++;
                setTimeout(() => {
                    if (i === texts.length) {
                        textDiv.style.marginBottom = "20px";
                        img.style.display = "inline-block";
                    } else {
                        textDiv.innerHTML = "";
                        setTimeout(showNextText, 500);
                    }
                }, 2500);
            }
        }

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 300);
        }
    </script>
</body>
</html>
